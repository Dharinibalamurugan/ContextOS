trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'
  displayName: 'Set up Python'

- script: |
    python -m pip install --upgrade pip
  displayName: 'Install dependencies'

- script: |
    python -c "print('🧠 Hello from ContextOS - Never Lose Your Train of Thought!')"
  displayName: 'Run ContextOS script'